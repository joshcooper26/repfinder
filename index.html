<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--midnight:#002231;--red:#a9202a;--feather:#edece5;--feather2:#f5f4ef;--white:#fff;--text:#002231;--dim:#5a7080;--border:#c8d4da}
body{font-family:'Poppins',sans-serif;background:var(--feather);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{background:var(--midnight);height:58px;padding:0 28px;display:flex;align-items:center;gap:16px;flex-shrink:0;border-bottom:3px solid var(--red)}
.brand{display:flex;align-items:center;gap:10px}
.bracket{color:var(--red);font-family:'Saira',sans-serif;font-size:22px;font-weight:800}
.bname{font-family:'Saira',sans-serif;font-weight:700;font-size:15px;color:#fff;letter-spacing:.04em}
.bname span{color:var(--red)}
.tagline{font-size:11px;color:rgba(255,255,255,.4);border-left:1px solid rgba(255,255,255,.15);padding-left:16px;margin-left:4px}
.layout{flex:1;display:flex;overflow:hidden}
.map-area{flex:1;position:relative;overflow:hidden;background:var(--feather)}
.map-area svg{width:100%;height:100%;display:block}
.sidebar{width:280px;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;box-shadow:-2px 0 12px rgba(0,34,49,.07)}
.sb{padding:16px 18px;border-bottom:1px solid var(--border)}
.sb:last-child{border-bottom:none}
.sb-title{font-family:'Saira',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--midnight);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sb-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--red);border-radius:1px}
.county{stroke:rgba(0,34,49,.08);stroke-width:.3px;fill:var(--feather)}
.county.assigned{stroke:rgba(0,34,49,.15);stroke-width:.4px;cursor:pointer}
.county.assigned:hover{stroke:var(--midnight);stroke-width:1.5px}
.state-border{fill:none;stroke:var(--midnight);stroke-width:2px;pointer-events:none}
.tt{position:fixed;padding:10px 14px;background:var(--midnight);border-radius:6px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .1s;z-index:999;max-width:240px;box-shadow:0 8px 24px rgba(0,34,49,.3);color:#fff}
.tt.on{opacity:1}
.tt-name{font-family:'Saira',sans-serif;font-weight:700;font-size:13px;margin-bottom:2px}
.tt-sub{color:rgba(255,255,255,.5);font-size:11px;margin-bottom:3px}
.tt-rep{color:#66b0d4;font-weight:600}
.tt-hint{color:rgba(255,255,255,.35);font-size:10px;margin-top:3px;font-style:italic}
.search-wrap{position:relative}
.search-inp{width:100%;padding:8px 60px 8px 12px;background:var(--feather2);border:1.5px solid var(--border);border-radius:4px;color:var(--text);font-family:'Poppins',sans-serif;font-size:12px;outline:none}
.search-inp:focus{border-color:var(--midnight)}
.search-inp::placeholder{color:var(--dim)}
.search-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);padding:4px 10px;background:var(--midnight);color:#fff;border:none;border-radius:3px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;cursor:pointer}
.result-box{padding:10px 12px;border-radius:4px;font-size:12px;display:none;margin-top:10px}
.result-box.show{display:block}
.result-box.found{background:rgba(0,173,0,.08);border:1px solid rgba(0,173,0,.25)}
.result-box.miss{background:rgba(215,41,1,.08);border:1px solid rgba(215,41,1,.2)}
.result-box.loading{background:rgba(0,34,49,.06);border:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:3px;transition:background .1s}
.leg-item:last-child{border-bottom:none}
.leg-item:hover{background:var(--feather2)}
.leg-sw{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.leg-lbl{font-size:13px;font-weight:600;color:var(--midnight)}
/* ZOOM BAR */
.zoom-bar{height:42px;background:var(--midnight);border-top:2px solid var(--red);display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0;user-select:none}
.z-btn{width:26px;height:26px;border-radius:4px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.z-btn:hover{background:rgba(255,255,255,.18)}
.z-track{flex:1;max-width:320px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;position:relative;cursor:pointer}
.z-fill{height:100%;border-radius:2px;background:var(--red)}
.z-thumb{width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid var(--red);position:absolute;top:50%;transform:translate(-50%,-50%);pointer-events:none}
.z-lbl{font-family:monospace;font-size:11px;color:rgba(255,255,255,.5);width:44px;text-align:center}
.z-reset{font-size:11px;font-weight:600;color:rgba(255,255,255,.45);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:3px;font-family:'Poppins',sans-serif}
.z-reset:hover{color:#fff}
/* POPUP */
.popup{position:fixed;z-index:1200;background:var(--white);border:1px solid var(--border);border-radius:8px;max-width:420px;min-width:300px;box-shadow:0 12px 40px rgba(0,34,49,.2);display:none;overflow:hidden;flex-direction:column}
.popup.on{display:flex}
.popup-hdr{background:var(--midnight);padding:14px 18px 12px;position:relative;flex-shrink:0;cursor:grab;user-select:none}
.popup-hdr:active{cursor:grabbing}
.popup-close{position:absolute;top:10px;right:12px;background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;line-height:1;padding:2px 8px}
.popup-close:hover{color:#fff}
.popup-title{font-family:'Saira',sans-serif;font-weight:700;font-size:16px;color:#fff}
.popup-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px}
.popup-body{overflow-y:auto;flex:1}
.rep-card{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;gap:12px}
.rep-card:last-child{border-bottom:none}
.rep-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Saira',sans-serif;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.rep-name{font-weight:600;font-size:13px;color:var(--midnight);margin-bottom:3px}
.rep-terr{font-size:11px;color:var(--red);font-weight:500;margin-bottom:6px}
.rep-contact{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:5px;margin-top:3px}
.rep-contact a{color:var(--midnight);text-decoration:none;font-weight:500}
.rep-contact a:hover{color:var(--red)}
.leg-item{cursor:pointer;display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--border);transition:background .12s;border-radius:3px}
.leg-item:last-child{border-bottom:none}
.leg-item:hover{background:rgba(0,34,49,.05)}
.leg-item.active{background:rgba(169,32,42,.07)}
/* HERO */
.hero{background:var(--midnight);padding:28px 32px 26px;flex-shrink:0;border-bottom:3px solid var(--red);transition:all .35s ease;overflow:hidden}
.hero.collapsed{padding:0;border-bottom:none;max-height:0}
.hero-inner{max-width:560px;margin:0 auto;text-align:center}
.hero-headline{font-family:'Saira',sans-serif;font-size:28px;font-weight:800;color:#fff;letter-spacing:-.01em;margin-bottom:6px}
.hero-headline span{color:var(--red)}
.hero-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:18px}
.hero-search{display:flex;gap:0;max-width:420px;margin:0 auto}
.hero-inp{flex:1;padding:11px 16px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-right:none;border-radius:4px 0 0 4px;color:#fff;font-family:'Poppins',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.hero-inp:focus{border-color:rgba(255,255,255,.5)}
.hero-inp::placeholder{color:rgba(255,255,255,.35)}
.hero-btn{padding:11px 20px;background:var(--red);color:#fff;border:none;border-radius:0 4px 4px 0;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
.hero-btn:hover{background:#c0252f}
/* popup CTA strip */
.popup-cta{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(169,32,42,.05);border-top:1px solid rgba(169,32,42,.15)}
.popup-cta-text{font-size:11px;color:var(--dim);line-height:1.4}
.popup-cta-text strong{color:var(--text);font-weight:600;display:block;margin-bottom:1px}
.popup-cta-btn{flex-shrink:0;padding:7px 14px;background:var(--red);color:#fff;border:none;border-radius:4px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap;transition:background .15s}
.popup-cta-btn:hover{background:#c0252f}
footer{background:var(--midnight);height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-top:2px solid var(--red)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* ── MOBILE ── */
@media(max-width:640px){
  body{overflow:auto;height:auto;min-height:100vh}
  header{height:48px;padding:0 16px}
  .brand svg{height:22px!important}
  .tagline{display:none}
  .hero{padding:20px 16px 18px}
  .hero.collapsed{padding:0;max-height:0}
  .hero-headline{font-size:22px}
  .hero-sub{font-size:12px;margin-bottom:14px}
  .hero-inp{font-size:14px;padding:10px 12px}
  .hero-btn{font-size:13px;padding:10px 14px}
  .layout{flex-direction:column;overflow:visible;height:auto}
  .map-area{width:100%;height:52vw;min-height:220px;max-height:320px;flex:none;border-bottom:2px solid var(--border)}
  .sidebar{width:100%;border-left:none;border-top:1px solid var(--border);overflow-y:visible;box-shadow:none;flex-shrink:0}
  .zoom-bar{display:none}
  footer{height:32px}
  footer svg{height:16px!important}
  /* popup becomes bottom sheet on mobile */
  .popup{position:fixed!important;left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%!important;max-width:100%!important;min-width:0!important;border-radius:12px 12px 0 0!important;max-height:75vh;transform:none!important}
  .popup-hdr{cursor:default;border-radius:12px 12px 0 0}
  .popup-hdr::before{content:'';display:block;width:36px;height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin:0 auto 10px}
  .tt{display:none}
}
</style>
</head>

var SF={"Alabama":"01","Alaska":"02","Arizona":"04","Arkansas":"05","California":"06","Colorado":"08","Connecticut":"09","Delaware":"10","Florida":"12","Georgia":"13","Hawaii":"15","Idaho":"16","Illinois":"17","Indiana":"18","Iowa":"19","Kansas":"20","Kentucky":"21","Louisiana":"22","Maine":"23","Maryland":"24","Massachusetts":"25","Michigan":"26","Minnesota":"27","Mississippi":"28","Missouri":"29","Montana":"30","Nebraska":"31","Nevada":"32","New Hampshire":"33","New Jersey":"34","New Mexico":"35","New York":"36","North Carolina":"37","North Dakota":"38","Ohio":"39","Oklahoma":"40","Oregon":"41","Pennsylvania":"42","Rhode Island":"44","South Carolina":"45","South Dakota":"46","Tennessee":"47","Texas":"48","Utah":"49","Vermont":"50","Virginia":"51","Washington":"53","West Virginia":"54","Wisconsin":"55","Wyoming":"56","District of Columbia":"11"};
var FS2N={};Object.entries(SF).forEach(function(e){FS2N[e[1]]=e[0];});
var usData=null,fipsMap={},fips2co={},stateReps={},coReps={},pinFips=null,pinScreenXY=null,highlightRep=null;
var ZB,ZG,svgEl;
var MIN_Z=0.5,MAX_Z=5;
TERRITORIES.forEach(function(t){var sf=SF[t.state];if(!sf)return;if((t.county||'').toLowerCase()==='full state')stateReps[sf]={rep:t.rep,date:t.date};});
function getRep(fips){if(coReps[fips])return coReps[fips].rep;var sf=fips.slice(0,2);return stateReps[sf]?stateReps[sf].rep:null;}
function getAsgn(fips){if(coReps[fips])return coReps[fips];var sf=fips.slice(0,2);return stateReps[sf]||null;}
async function init(){
  var r=await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json');
  usData=await r.json();
  topojson.feature(usData,usData.objects.counties).features.forEach(function(f){var fips=f.id.toString().padStart(5,'0'),sf=fips.slice(0,2),nm=f.properties.name;if(nm&&FS2N[sf]){var key=fips==='29510'?'29-st. louis city':sf+'-'+nm.toLowerCase().replace(/ county$/i,'').trim();fipsMap[key]=fips;fips2co[fips]={name:fips==='29510'?'St. Louis City':nm,state:FS2N[sf]};}});
  TERRITORIES.forEach(function(t){var sf=SF[t.state];if(!sf)return;if((t.county||'').toLowerCase()!=='full state'){var countyNorm=(t.county||'').toLowerCase().trim();var k=(sf==='29'&&countyNorm.replace(/[s.]/g,'').indexOf('stlouiscity')!==-1)?'29-st. louis city':sf+'-'+countyNorm;var fips=fipsMap[k];if(fips)coReps[fips]={rep:t.rep,date:t.date};}});
  drawMap();renderLegend();
}
function buildHlFips(){
  if(!highlightRep)return null;
  var s=new Set();
  var counties=topojson.feature(usData,usData.objects.counties).features;
  Object.entries(coReps).forEach(function(e){if(e[1].rep===highlightRep)s.add(e[0]);});
  Object.entries(stateReps).forEach(function(e){if(e[1].rep===highlightRep){counties.forEach(function(f){var fips=f.id.toString().padStart(5,'0');if(fips.slice(0,2)===e[0]&&!coReps[fips])s.add(fips);});}});
  return s;
}
function drawMap(){
  var wrap=document.getElementById('map-area'),w=wrap.clientWidth,h=wrap.clientHeight;if(!w||!h)return;
  svgEl=document.getElementById('map-svg');
  var svg=d3.select(svgEl).attr('viewBox','0 0 '+w+' '+h);svg.selectAll('*').remove();
  var counties=topojson.feature(usData,usData.objects.counties).features;
  var proj=d3.geoAlbersUsa().fitSize([w-20,h-20],{type:'FeatureCollection',features:counties});
  var path=d3.geoPath().projection(proj);var g=svg.append('g');ZG=g;
  var hlFips=buildHlFips();
  g.selectAll('path.county').data(counties).join('path').attr('class','county').attr('d',path)
    .each(function(d){
      var fips=d.id.toString().padStart(5,'0'),rep=getRep(fips);
      var el=d3.select(this);
      if(rep&&REP_COLORS[rep]){el.style('fill',REP_COLORS[rep]).classed('assigned',true);}
      if(hlFips){
        if(hlFips.has(fips)){el.style('fill-opacity','0.85').style('stroke','rgba(255,255,255,0.6)').style('stroke-width','0.8px');}
        else{el.style('fill-opacity',rep?'0.1':'0.4').style('stroke',rep?'rgba(0,34,49,.03)':'rgba(0,34,49,.06)');}
      }else{if(rep&&REP_COLORS[rep])el.style('fill-opacity','0.75');}
    })
    .on('click',function(ev,d){
      ev.stopPropagation();
      var fips=d.id.toString().padStart(5,'0');
      var info=fips2co[fips]||{name:'Unknown',state:''};
      var asgn=getAsgn(fips);
      document.getElementById('tt').classList.remove('on');
      highlightRep=null;
      // Update pin and search bar to reflect clicked county
      pinFips=fips;
      var locLabel=(info.name?info.name+' County, ':'')+info.state;
      document.getElementById('hero-inp').value=locLabel;
      document.getElementById('pub-addr-inp').value=locLabel;
      document.getElementById('hero').classList.add('collapsed');
      var rb=document.getElementById('result-box');
      if(asgn){
        rb.className='result-box show found';
        rb.innerHTML='<strong style="color:#007a00">✓ Covered</strong><div style="margin:4px 0"><strong>'+locLabel+'</strong></div><div>Rep: <strong style="color:'+(REP_COLORS[asgn.rep]||'#002231')+'">'+asgn.rep+'</strong></div>';
      }else{
        rb.className='result-box show miss';
        rb.innerHTML='<strong style="color:#d72901">✗ Not Covered</strong><div style="margin:4px 0"><strong>'+locLabel+'</strong></div><div style="color:#5a7080">No rep assigned to this area.</div>';
      }
      drawMap();
      if(asgn)openPopup(asgn.rep,ev.clientX,ev.clientY);
    })
    .on('mousemove',function(ev,d){var fips=d.id.toString().padStart(5,'0'),info=fips2co[fips]||{name:'Unknown',state:''};var asgn=getAsgn(fips);var ttEl=document.getElementById('tt');var h='<div class="tt-name">'+info.name+' County</div><div class="tt-sub">'+info.state+'</div>';if(asgn){h+='<div class="tt-rep">'+asgn.rep+'</div><div class="tt-hint">Click for rep info</div>';}else{h+='<div style="color:rgba(255,255,255,.4);font-size:11px;font-style:italic">No rep assigned</div>';}ttEl.innerHTML=h;ttEl.classList.add('on');ttEl.style.left=Math.min(ev.clientX+14,window.innerWidth-260)+'px';ttEl.style.top=Math.min(ev.clientY+14,window.innerHeight-120)+'px';})
    .on('mouseleave',function(){document.getElementById('tt').classList.remove('on');});
  if(pinFips){
    var feat=counties.find(function(f){return f.id.toString().padStart(5,'0')===pinFips;});
    if(feat){
      g.append('path').datum(feat).attr('d',path).attr('fill','rgba(169,32,42,0.15)').attr('stroke','#a9202a').attr('stroke-width',2).attr('pointer-events','none');
      var c=path.centroid(feat);
      if(c&&!isNaN(c[0])){
        var svgRect=svgEl.getBoundingClientRect();
        var cur=ZB?d3.zoomTransform(svgEl):{k:1,x:0,y:0};
        pinScreenXY={x:c[0]*cur.k+cur.x+svgRect.left,y:c[1]*cur.k+cur.y+svgRect.top};
        var pg=g.append('g').attr('transform','translate('+c[0]+','+c[1]+')').attr('pointer-events','none');
        var pr=10,oy=-(pr+pr*1.6*0.35),pg2=pg.append('g').attr('transform','translate(0,'+oy+')');
        pg2.append('ellipse').attr('cx',1.5).attr('cy',pr*2.1).attr('rx',5).attr('ry',2.5).attr('fill','rgba(0,34,49,0.25)');
        pg2.append('path').attr('d','M 0,'+pr*2.1+' C '+(-pr*0.6)+','+pr*1.4+' '+(-pr)+','+pr*0.7+' '+(-pr)+',0 A '+pr+','+pr+' 0 1,1 '+pr+',0 C '+pr+','+pr*0.7+' '+pr*0.6+','+pr*1.4+' 0,'+pr*2.1+' Z').attr('fill','#a9202a');
        pg2.append('circle').attr('cx',0).attr('cy',0).attr('r',pr*0.38).attr('fill','#fff');
      }
    }
  }
  g.append('path').datum(topojson.mesh(usData,usData.objects.states,function(a,b){return a===b;})).attr('class','state-border').attr('d',path);
  g.append('path').datum(topojson.mesh(usData,usData.objects.states,function(a,b){return a!==b;})).attr('class','state-border').attr('d',path);
  ZB=d3.zoom().scaleExtent([MIN_Z,MAX_Z]).on('zoom',function(ev){g.attr('transform',ev.transform);syncZUI(ev.transform.k);});
  d3.select(svgEl).call(ZB).on('dblclick.zoom',null);
}
// ── ZOOM ──
function syncZUI(k){if(k===undefined){try{k=d3.zoomTransform(svgEl).k;}catch{k=1;}}var t=(k-MIN_Z)/(MAX_Z-MIN_Z);document.getElementById('z-fill').style.width=(t*100)+'%';document.getElementById('z-thumb').style.left=(t*100)+'%';document.getElementById('z-lbl').textContent=Math.round(k*100)+'%';}
function applyZ(k){if(!svgEl||!ZB)return;var vb=(svgEl.getAttribute('viewBox')||'').split(' ').map(Number);var cx=(vb[2]||800)/2,cy=(vb[3]||500)/2;var cur=d3.zoomTransform(svgEl);var ratio=k/(cur.k||1);d3.select(svgEl).call(ZB.transform,d3.zoomIdentity.translate(cx+(cur.x-cx)*ratio,cy+(cur.y-cy)*ratio).scale(k));syncZUI(k);}
function stepZ(delta){var k=1;try{k=d3.zoomTransform(svgEl).k;}catch{}applyZ(Math.min(MAX_Z,Math.max(MIN_Z,+(k+delta).toFixed(4))));}
var zt=document.getElementById('z-track');var zDrag=false;
function zPct(e){var r=zt.getBoundingClientRect();applyZ(MIN_Z+Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*(MAX_Z-MIN_Z));}
zt.addEventListener('mousedown',function(e){zDrag=true;zPct(e);});
document.addEventListener('mousemove',function(e){if(zDrag)zPct(e);});
document.addEventListener('mouseup',function(){zDrag=false;});
document.getElementById('z-in').addEventListener('click',function(){stepZ(.25);});
document.getElementById('z-out').addEventListener('click',function(){stepZ(-.25);});
document.getElementById('z-reset').addEventListener('click',function(){applyZ(1);});
svgEl=document.getElementById('map-svg');
document.getElementById('map-area').addEventListener('wheel',function(){requestAnimationFrame(syncZUI);},{passive:true});
// ── POPUP ──
function positionPopup(popup,clickX,clickY){
  if(window.innerWidth<=640){popup.style.left='';popup.style.top='';return;}
  var pw=420;
  var body=document.getElementById('popup-body');
  var estimatedH=Math.min(window.innerHeight-80,body.scrollHeight+100||400);
  popup.style.maxHeight=(window.innerHeight-80)+'px';
  var lft=clickX+16;
  if(lft+pw>window.innerWidth-10)lft=clickX-pw-10;
  if(lft<10)lft=10;
  var top=clickY-40;
  if(top+estimatedH>window.innerHeight-50)top=window.innerHeight-estimatedH-50;
  if(top<10)top=10;
  popup.style.left=lft+'px';popup.style.top=top+'px';
}
function makeDraggable(popup,handle){
  if(handle._dragBound)return;handle._dragBound=true;
  var sx,sy,sl,st;
  handle.addEventListener('mousedown',function(e){
    if(window.innerWidth<=640)return;
    if(e.target.closest('button'))return;
    sx=e.clientX;sy=e.clientY;sl=parseInt(popup.style.left)||0;st=parseInt(popup.style.top)||0;
    handle.style.cursor='grabbing';
    function onMove(e){popup.style.left=Math.max(0,Math.min(window.innerWidth-80,sl+(e.clientX-sx)))+'px';popup.style.top=Math.max(0,Math.min(window.innerHeight-80,st+(e.clientY-sy)))+'px';}
    function onUp(){handle.style.cursor='grab';document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
}
function openPopup(repName,clickX,clickY){
  var contacts=REP_CONTACTS.filter(function(c){return(c.repGroup||'').trim()===repName.trim()||(((c.firstName||'')+' '+(c.lastName||'')).trim())===repName.trim();});
  var groupName=contacts.length>0?(contacts[0].repGroup||repName):repName;
  document.getElementById('popup-title').textContent=groupName;
  document.getElementById('popup-sub').textContent=contacts.length?contacts.length+' rep'+(contacts.length!==1?'s':'')+' covering this territory':'';
  var body=document.getElementById('popup-body');body.innerHTML='';
  // CTA strip at the TOP
  if(contacts.length){
    var cta=document.createElement('div');cta.className='popup-cta';
    var demoEmail=(contacts[0].contactEmail||'info@cn-seamless.com');
    cta.innerHTML='<div class="popup-cta-text"><strong>Ready for a demo?</strong>Reach out to schedule a visit.</div><a class="popup-cta-btn" href="mailto:'+demoEmail+'?subject=CN-Seamless%20Demo%20Inquiry&cc=sales%40cn-seamless.com">Schedule Demo</a>';
    body.appendChild(cta);
  }
  if(!contacts.length){body.innerHTML='<div style="padding:20px;text-align:center;font-size:13px;color:#5a7080">No contact information available for this territory.</div>';}
  else{contacts.forEach(function(rep){var color=REP_COLORS[repName]||'#002231';var initials=((rep.firstName||'?')[0]+((rep.lastName||'')[0]||'')).toUpperCase();var ce=rep.contactEmail||'',le=(rep.leadEmail&&rep.leadEmail!==ce)?rep.leadEmail:'',ph=rep.phone||'',terr=rep.localTerritory||'';var subj='?subject=CN-Seamless%20Demo%20Inquiry&cc=sales%40cn-seamless.com';var html='<div class="rep-card"><div class="rep-avatar" style="background:'+color+'">'+initials+'</div><div style="flex:1;min-width:0"><div class="rep-name">'+((rep.firstName||'')+' '+(rep.lastName||'')).trim()+'</div>';if(terr)html+='<div class="rep-terr">'+terr+'</div>';if(ce)html+='<div class="rep-contact"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><a href="mailto:'+ce+subj+'">'+ce+'</a></div>';if(le)html+='<div class="rep-contact" style="color:#a9202a"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><a href="mailto:'+le+subj+'" style="color:#a9202a">'+le+' (leads)</a></div>';if(ph)html+='<div class="rep-contact"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.03 1.21 2 2 0 012 .03h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg><a href="tel:'+ph.replace(/[^0-9+]/g,'')+'">'+ph+'</a></div>';html+='</div></div>';body.innerHTML+=html;});}
  var popup=document.getElementById('popup');popup.style.display='flex';popup.classList.add('on');
  positionPopup(popup,clickX,clickY);
  makeDraggable(popup,document.getElementById('popup-hdr'));
}
function closePopup(){var p=document.getElementById('popup');p.classList.remove('on');p.style.display='none';document.querySelectorAll('.leg-item').forEach(function(el){el.classList.remove('active');});if(!highlightRep)return;highlightRep=null;drawMap();}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePopup();});
document.addEventListener('click',function(e){var p=document.getElementById('popup');if(p.classList.contains('on')&&!p.contains(e.target)&&!e.target.closest('.leg-item'))closePopup();});
function renderLegend(){
  var lg=document.getElementById('legend');lg.innerHTML='';
  var groups={};TERRITORIES.forEach(function(t){if(!groups[t.rep])groups[t.rep]=[];groups[t.rep].push(t);});
  Object.entries(groups).forEach(function(entry){
    var rep=entry[0],color=REP_COLORS[rep]||'#002231';
    var item=document.createElement('div');item.className='leg-item';item.title='Click to view rep contact info';
    item.innerHTML='<div class="leg-sw" style="background:'+color+'"></div><div class="leg-lbl">'+rep+'</div>';
    item.addEventListener('click',function(ev){
      ev.stopPropagation();
      var isActive=item.classList.contains('active');
      // Close any open card first
      var p=document.getElementById('popup');p.classList.remove('on');p.style.display='none';
      document.querySelectorAll('.leg-item').forEach(function(el){el.classList.remove('active');});
      highlightRep=null;
      if(isActive){drawMap();return;}
      // Open for this rep
      highlightRep=rep;drawMap();item.classList.add('active');
      // Position near the sidebar left edge, vertically centered
      var sr=document.querySelector('.sidebar').getBoundingClientRect();
      openPopup(rep,sr.left-16,sr.top+80);
    });
    lg.appendChild(item);
  });
}
document.getElementById('pub-addr-inp').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch('side');});
var lastSearchSource='hero';
async function doSearch(source){
  var heroInp=document.getElementById('hero-inp');
  var sideInp=document.getElementById('pub-addr-inp');
  // Read from the source that triggered the search
  var addr=(source==='side'?sideInp.value:heroInp.value).trim();
  if(!addr)addr=(heroInp.value.trim()||sideInp.value.trim());
  if(!addr)return;
  heroInp.value=addr;sideInp.value=addr;
  // Collapse hero after first search
  document.getElementById('hero').classList.add('collapsed');
  var rb=document.getElementById('result-box');rb.className='result-box show loading';rb.innerHTML='<strong>Searching…</strong>';
  pinFips=null;pinScreenXY=null;highlightRep=null;closePopup();
  try{
    var res=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(addr)+'&format=json&addressdetails=1&countrycodes=us&limit=1');
    var data=await res.json();
    if(!data||!data.length){rb.className='result-box show miss';rb.innerHTML='<strong>Not found.</strong>';return;}
    var a=data[0].address||{},state=a.state||'',county=(a.county||'').replace(/ County$/i,'').trim();
    var sf=SF[state];var match=null;
    if(sf){var k=sf+'-'+county.toLowerCase(),fips=fipsMap[k];if(fips){pinFips=fips;if(coReps[fips])match=coReps[fips];}if(!match&&stateReps[sf])match=stateReps[sf];}
    drawMap();
    if(match){
      rb.className='result-box show found';
      rb.innerHTML='<strong style="color:#007a00">✓ Covered</strong><div style="margin:4px 0"><strong>'+(county?county+' County, ':'')+state+'</strong></div><div>Rep: <strong style="color:'+(REP_COLORS[match.rep]||'#002231')+'">'+match.rep+'</strong></div>';
      // Open popup near the pin
      if(pinScreenXY){openPopup(match.rep,pinScreenXY.x+20,pinScreenXY.y-60);}
      else{var sr=document.querySelector('.sidebar').getBoundingClientRect();openPopup(match.rep,sr.left-440,sr.top+60);}
    }else{
      rb.className='result-box show miss';
      rb.innerHTML='<strong style="color:#d72901">✗ Not Covered</strong><div style="margin:4px 0"><strong>'+(county?county+' County, ':'')+state+'</strong></div><div style="color:#5a7080">No rep assigned to this area.</div>';
    }
  }catch(err){rb.className='result-box show miss';rb.innerHTML='<strong>Error:</strong> '+err.message;}
}
window.doSearch=doSearch;
window.closePopup=closePopup;
window.addEventListener('resize',drawMap);
syncZUI(1);
init();
})();
</script>
